<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイ語チャレンジ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a8c3a" id="theme-meta">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="タイ語">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  @font-face {
    font-family: 'M PLUS Rounded 1c';
    font-style: normal; font-weight: 700; font-display: swap;
    src: url('fonts/mplus-japanese-700.woff2') format('woff2');
    unicode-range: U+3000-9FFF, U+F900-FAFF, U+FF00-FFEF;
  }
  @font-face {
    font-family: 'M PLUS Rounded 1c';
    font-style: normal; font-weight: 700; font-display: swap;
    src: url('fonts/mplus-latin-700.woff2') format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'M PLUS Rounded 1c';
    font-style: normal; font-weight: 900; font-display: swap;
    src: url('fonts/mplus-japanese-900.woff2') format('woff2');
    unicode-range: U+3000-9FFF, U+F900-FAFF, U+FF00-FFEF;
  }
  @font-face {
    font-family: 'M PLUS Rounded 1c';
    font-style: normal; font-weight: 900; font-display: swap;
    src: url('fonts/mplus-latin-900.woff2') format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  :root {
    --accent:      #1a8c3a;
    --accent-dark: #0f4d20;
    --accent-glow: rgba(26,140,58,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: var(--accent-dark);
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    transition: background 0.4s;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: #0a0a0a;
    border-bottom: 2.5px solid var(--accent);
    flex-shrink: 0;
    z-index: 20;
    transition: border-color 0.4s;
  }

  #topbar h1 {
    font-size: 0.88rem;
    font-weight: 900;
    color: #fff;
    white-space: nowrap;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  .vsep { width: 1px; height: 26px; background: #333; flex-shrink: 0; }

  #level-select {
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 700;
    background: #1a1a1a;
    color: #fff;
    border: 2px solid var(--accent);
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    outline: none;
    flex: 1;
    max-width: 260px;
    transition: border-color 0.4s, box-shadow 0.4s;
  }
  #level-select:focus { box-shadow: 0 0 0 3px var(--accent-glow); }
  #level-select option, #level-select optgroup { background: #111; }

  /* ── TOOL BAR ── */
  #toolbar {
    display: flex;
    align-items: center;
    padding: 7px 12px;
    background: #111;
    border-bottom: 1.5px solid #222;
    flex-shrink: 0;
    gap: 8px;
    z-index: 19;
  }

  #toolbar-left  { display: flex; align-items: center; gap: 6px; flex: 1; }
  #toolbar-center { display: flex; align-items: center; gap: 5px; flex: 2; justify-content: center; }
  #toolbar-right { display: flex; align-items: center; gap: 6px; flex: 1; justify-content: flex-end; }

  .tool-btn {
    height: 36px;
    padding: 0 11px;
    border-radius: 9px;
    border: 2px solid #333;
    background: #1e1e1e;
    color: #bbb;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tool-btn:hover { border-color: var(--accent); color: #fff; }

  .action-btn { border-color: #2a2a2a; background: #181818; color: #777; font-size: 0.78rem; }
  .action-btn:hover { border-color: #555; color: #ccc; background: #222; }

  .tool-btn.pen-active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 2px 12px var(--accent-glow);
    transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
  }

  .tool-btn.eraser-active {
    background: #3a3a3a;
    border-color: #666;
    color: #fff;
  }

  /* Color swatches */
  .swatch {
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer;
    border: 2.5px solid transparent;
    transition: transform 0.12s, border-color 0.12s;
    flex-shrink: 0;
  }
  .swatch:hover { transform: scale(1.2); }
  .swatch.active { border-color: #fff; transform: scale(1.18); box-shadow: 0 0 0 1.5px #000; }

  #custom-color {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2.5px solid #555;
    cursor: pointer;
    padding: 0;
    background: none;
    flex-shrink: 0;
  }

  /* ── CANVAS ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #fff;
  }

  #bg-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain; object-position: center;
    pointer-events: none; z-index: 1; display: none;
  }

  #draw-canvas {
    position: absolute; inset: 0; z-index: 2;
    width: 100%; height: 100%;
    touch-action: none;
  }

  #placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; background: #f7f4ee; z-index: 0;
  }
  #placeholder .emoji { font-size: 3.5rem; }
  #placeholder p { font-size: 1rem; font-weight: 700; color: #aaa; }

  #cursor-dot {
    position: fixed; pointer-events: none;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
    transition: width 0.08s, height 0.08s;
    display: none;
  }
</style>
</head>
<body>

<div id="cursor-dot"></div>

<!-- TOP BAR -->
<div id="topbar">
  <h1>🇹🇭 タイ語</h1>
  <div class="vsep"></div>
  <select id="level-select">
    <option value="">-- レベルを選んでください --</option>
    <optgroup label="★ レベル1">
      <option value="1a">チャレンジ 1a ★</option>
      <option value="1b">チャレンジ 1b ★</option>
      <option value="1c">チャレンジ 1c ★</option>
    </optgroup>
    <optgroup label="★★ レベル2">
      <option value="2a">チャレンジ 2a ★★</option>
      <option value="2b">チャレンジ 2b ★★</option>
      <option value="2c">チャレンジ 2c ★★</option>
      <option value="2d">チャレンジ 2d ★★</option>
    </optgroup>
    <optgroup label="★★★ レベル3">
      <option value="3a">チャレンジ 3a ★★★</option>
      <option value="3b">チャレンジ 3b ★★★</option>
      <option value="3c">チャレンジ 3c ★★★</option>
      <option value="3d">チャレンジ 3d ★★★</option>
    </optgroup>
    <optgroup label="😮 レベル4">
      <option value="4a">チャレンジ 4a 😮</option>
      <option value="4b">チャレンジ 4b 😮</option>
    </optgroup>
    <optgroup label="🤯 レベル5">
      <option value="5a">チャレンジ 5a 🤯</option>
      <option value="5b">チャレンジ 5b 🤯</option>
    </optgroup>
  </select>
</div>

<!-- TOOL BAR -->
<div id="toolbar">

  <!-- LEFT: Undo + Clear -->
  <div id="toolbar-left">
    <button class="tool-btn action-btn" id="undo-btn">↩ 戻す</button>
    <button class="tool-btn action-btn" id="clear-btn">🗑 クリア</button>
  </div>

  <!-- CENTER: Colors -->
  <div id="toolbar-center">
    <div class="swatch active" style="background:#111111" data-color="#111111"></div>
    <div class="swatch" style="background:#e74c3c" data-color="#e74c3c"></div>
    <div class="swatch" style="background:#e85d26" data-color="#e85d26"></div>
    <div class="swatch" style="background:#f4a83a" data-color="#f4a83a"></div>
    <div class="swatch" style="background:#1a6fc4" data-color="#1a6fc4"></div>
    <div class="swatch" style="background:#27ae60" data-color="#27ae60"></div>
    <div class="swatch" style="background:#9b59b6" data-color="#9b59b6"></div>
    <div class="swatch" style="background:#fff;outline:1.5px solid #bbb" data-color="#ffffff"></div>
    <input type="color" id="custom-color" value="#111111" title="カスタム">
  </div>

  <!-- RIGHT: Pen + Eraser -->
  <div id="toolbar-right">
    <button class="tool-btn pen-active" id="btn-pen">✏️ ペン</button>
    <button class="tool-btn" id="btn-eraser">⌫ 消しゴム</button>
  </div>

</div>

<!-- CANVAS -->
<div id="canvas-wrap">
  <div id="placeholder">
    <div class="emoji">🇹🇭</div>
    <p>レベルを選んで練習スタート！</p>
  </div>
  <img id="bg-img" alt="" draggable="false">
  <canvas id="draw-canvas"></canvas>
</div>

<script>
// ── THEME per level (green → yellow-green → yellow → orange → red) ────────
const THEMES = {
  '1a': { accent:'#1a8c3a', dark:'#0a3518', glow:'rgba(26,140,58,0.4)'  },
  '1b': { accent:'#1a8c3a', dark:'#0a3518', glow:'rgba(26,140,58,0.4)'  },
  '1c': { accent:'#1a8c3a', dark:'#0a3518', glow:'rgba(26,140,58,0.4)'  },
  '2a': { accent:'#5aaa20', dark:'#253d0a', glow:'rgba(90,170,32,0.4)'  },
  '2b': { accent:'#5aaa20', dark:'#253d0a', glow:'rgba(90,170,32,0.4)'  },
  '2c': { accent:'#5aaa20', dark:'#253d0a', glow:'rgba(90,170,32,0.4)'  },
  '2d': { accent:'#5aaa20', dark:'#253d0a', glow:'rgba(90,170,32,0.4)'  },
  '3a': { accent:'#c8a800', dark:'#3d3200', glow:'rgba(200,168,0,0.4)'  },
  '3b': { accent:'#c8a800', dark:'#3d3200', glow:'rgba(200,168,0,0.4)'  },
  '3c': { accent:'#c8a800', dark:'#3d3200', glow:'rgba(200,168,0,0.4)'  },
  '3d': { accent:'#c8a800', dark:'#3d3200', glow:'rgba(200,168,0,0.4)'  },
  '4a': { accent:'#e85d26', dark:'#4a1a08', glow:'rgba(232,93,38,0.4)'  },
  '4b': { accent:'#e85d26', dark:'#4a1a08', glow:'rgba(232,93,38,0.4)'  },
  '5a': { accent:'#d01820', dark:'#400508', glow:'rgba(208,24,32,0.4)'  },
  '5b': { accent:'#d01820', dark:'#400508', glow:'rgba(208,24,32,0.4)'  },
};
const DEFAULT_THEME = THEMES['1a'];

function applyTheme(t) {
  const r = document.documentElement;
  r.style.setProperty('--accent',      t.accent);
  r.style.setProperty('--accent-dark', t.dark);
  r.style.setProperty('--accent-glow', t.glow);
  document.getElementById('theme-meta').setAttribute('content', t.accent);
}
applyTheme(DEFAULT_THEME);

// ── ELEMENTS ──────────────────────────────────────────────────────────────
const canvas      = document.getElementById('draw-canvas');
const ctx         = canvas.getContext('2d');
const wrap        = document.getElementById('canvas-wrap');
const bgImg       = document.getElementById('bg-img');
const placeholder = document.getElementById('placeholder');
const cursorDot   = document.getElementById('cursor-dot');
const btnPen      = document.getElementById('btn-pen');
const btnEraser   = document.getElementById('btn-eraser');

const PEN_SIZE    = 3;
const ERASER_SIZE = 80;

let tool = 'pen', color = '#111111';
let isDrawing = false, lastX = 0, lastY = 0;
let undoStack = [];

// ── CANVAS RESIZE ─────────────────────────────────────────────────────────
function resizeCanvas() {
  const prev = canvas.toDataURL();
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const img = new Image();
  img.src = prev;
  img.onload = () => ctx.drawImage(img, 0, 0);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── DRAWING ───────────────────────────────────────────────────────────────
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches && e.touches.length)
    return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function currentSize() { return tool === 'eraser' ? ERASER_SIZE : PEN_SIZE; }

function saveUndo() {
  undoStack.push(canvas.toDataURL());
  if (undoStack.length > 40) undoStack.shift();
}

canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onStart(e); }, { passive: false });
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(e); }, { passive: false });
canvas.addEventListener('mouseup', onStop);
canvas.addEventListener('touchend', onStop);
canvas.addEventListener('mouseleave', onStop);

function onStart(e) {
  saveUndo(); isDrawing = true;
  const { x, y } = getPos(e);
  lastX = x; lastY = y;
  ctx.beginPath();
  if (tool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.arc(x, y, ERASER_SIZE / 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.arc(x, y, PEN_SIZE / 2, 0, Math.PI * 2);
    ctx.fillStyle = color;
  }
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
}

function onMove(e) {
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const s = currentSize();
  cursorDot.style.left = cx + 'px'; cursorDot.style.top = cy + 'px';
  cursorDot.style.width = s + 'px'; cursorDot.style.height = s + 'px';
  cursorDot.style.background = tool === 'eraser' ? 'rgba(180,180,180,0.4)' : color + '88';
  cursorDot.style.border = tool === 'eraser' ? '2px solid #999' : '2px solid ' + color;

  if (!isDrawing) return;
  const { x, y } = getPos(e);
  ctx.beginPath();
  ctx.moveTo(lastX, lastY); ctx.lineTo(x, y);
  ctx.lineWidth = currentSize(); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (tool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = color;
  }
  ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';
  lastX = x; lastY = y;
}

function onStop() { isDrawing = false; ctx.globalCompositeOperation = 'source-over'; }

canvas.addEventListener('mouseenter', () => { cursorDot.style.display = 'block'; canvas.style.cursor = 'none'; });
canvas.addEventListener('mouseleave', () => { cursorDot.style.display = 'none';  canvas.style.cursor = 'default'; });

// ── LEVEL ─────────────────────────────────────────────────────────────────
document.getElementById('level-select').addEventListener('change', e => {
  const key = e.target.value;
  if (!key) { bgImg.style.display = 'none'; placeholder.style.display = 'flex'; applyTheme(DEFAULT_THEME); return; }
  bgImg.src = `sheets/${key}.webp`;
  bgImg.style.display = 'block';
  placeholder.style.display = 'none';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  undoStack = [];
  applyTheme(THEMES[key] || DEFAULT_THEME);
});

// ── TOOLS ─────────────────────────────────────────────────────────────────
btnPen.addEventListener('click', () => {
  tool = 'pen';
  btnPen.classList.add('pen-active');
  btnEraser.classList.remove('eraser-active');
});

btnEraser.addEventListener('click', () => {
  tool = 'eraser';
  btnEraser.classList.add('eraser-active');
  btnPen.classList.remove('pen-active');
});

// ── COLOR ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.swatch').forEach(s => {
  s.addEventListener('click', () => {
    color = s.dataset.color;
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    document.getElementById('custom-color').value = color;
    tool = 'pen'; btnPen.classList.add('pen-active'); btnEraser.classList.remove('eraser-active');
  });
});

document.getElementById('custom-color').addEventListener('input', e => {
  color = e.target.value;
  document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
  tool = 'pen'; btnPen.classList.add('pen-active'); btnEraser.classList.remove('eraser-active');
});

// ── UNDO / CLEAR ──────────────────────────────────────────────────────────
document.getElementById('undo-btn').addEventListener('click', undo);
document.getElementById('clear-btn').addEventListener('click', () => { saveUndo(); ctx.clearRect(0, 0, canvas.width, canvas.height); });

function undo() {
  if (!undoStack.length) return;
  const img = new Image();
  img.src = undoStack.pop();
  img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.key === 'e' || e.key === 'E') btnEraser.click();
  if (e.key === 'p' || e.key === 'P') btnPen.click();
});
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
